<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GeoChallenge</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div id="loading-screen">
    <img class="loading-planet" src="images/planet.png" alt="">
    <img class="loading-clouds" src="images/clouds.png" alt="">
    <img class="loading-clouds loading-clouds2" src="images/clouds.png" alt="">
    <img class="loading-clouds loading-clouds3" src="images/clouds.png" alt="">
    <img class="loading-clouds-b" src="images/clouds.png" alt="">
    <img class="loading-clouds-b loading-clouds-b2" src="images/clouds.png" alt="">
    <img class="loading-clouds-b loading-clouds-b3" src="images/clouds.png" alt="">
    <img class="loading-clouds-c" src="images/clouds.png" alt="">
    <img class="loading-clouds-c loading-clouds-c2" src="images/clouds.png" alt="">
    <img class="loading-clouds-c loading-clouds-c3" src="images/clouds.png" alt="">
    <div class="loading-clouds-fade"></div>
    <div class="loading-clouds-fade loading-clouds-fade2"></div>
    <div class="loading-clouds-fade loading-clouds-fade3"></div>
    <img class="flightatt-loading" data-frame="1" src="images/characters/flightattpost2/1.png" alt="">
    <img class="flightatt-loading" data-frame="2" src="images/characters/flightattpost2/2.png" alt="" loading="lazy">
    <img class="flightatt-loading" data-frame="3" src="images/characters/flightattpost2/3.png" alt="" loading="lazy">
    <img class="flightatt-loading" data-frame="4" src="images/characters/flightattpost2/4.png" alt="" loading="lazy">
    <img class="flightatt-loading" data-frame="5" src="images/characters/flightattpost2/5.png" alt="" loading="lazy">
    <img class="flightatt-loading" data-frame="6" src="images/characters/flightattpost2/6.png" alt="" loading="lazy">
    <img class="flightatt-loading" data-frame="7" src="images/characters/flightattpost2/7.png" alt="" loading="lazy">
    <img class="flightatt-loading" data-frame="8" src="images/characters/flightattpost2/8.png" alt="" loading="lazy">
    <img class="flightatt-loading" data-frame="9" src="images/characters/flightattpost2/9.png" alt="" loading="lazy">
    <img class="flightatt-loading" data-frame="10" src="images/characters/flightattpost2/10.png" alt="" loading="lazy">
    <img class="flightatt-loading" data-frame="11" src="images/characters/flightattpost2/11.png" alt="" loading="lazy">
    <div class="flightatt-loading-shadow"></div>
    <img id="loading-flags-btn" src="images/buttons/es-play.png" alt="Modo Banderas" style="display:none" draggable="false" oncontextmenu="return false">
    <img class="loading-logo" src="images/logo.png" alt="City Blitz" draggable="false" oncontextmenu="return false">
    <img class="loading-plane" src="images/plane.png" alt="" draggable="false" oncontextmenu="return false">
    <div class="loading-bar-track">
      <div class="loading-bar-fill" id="loading-bar-fill"></div>
    </div>
    <div class="loading-pct" id="loading-pct">0%</div>
    <img id="loading-play-btn" src="images/buttons/es-play.png" alt="Jugar" style="display:none" draggable="false" oncontextmenu="return false">
  </div>

  <div id="splash-screen" class="game-bg-screen" style="display:none">
    <img class="game-bg-table" src="images/checkerrortable.png" alt="" loading="lazy">
    <img class="game-bg-check3" src="images/check3.png" alt="" loading="lazy">
    <span class="grade-count-total"><span class="grade-count-x">x</span><span id="splash-count-total">0</span></span>
    <img class="game-bg-wrong3" src="images/wrong3.png" alt="" loading="lazy">
    <span class="wrong-count-total"><span class="wrong-count-x">x</span><span id="splash-wrong-total">0</span></span>
    <img class="flightatt-splash" data-frame="1" src="images/characters/flightattpost2/1.png" alt="">
    <img class="flightatt-splash" data-frame="2" src="images/characters/flightattpost2/2.png" alt="" loading="lazy">
    <img class="flightatt-splash" data-frame="3" src="images/characters/flightattpost2/3.png" alt="" loading="lazy">
    <img class="flightatt-splash" data-frame="4" src="images/characters/flightattpost2/4.png" alt="" loading="lazy">
    <img class="flightatt-splash" data-frame="5" src="images/characters/flightattpost2/5.png" alt="" loading="lazy">
    <img class="flightatt-splash" data-frame="6" src="images/characters/flightattpost2/6.png" alt="" loading="lazy">
    <img class="flightatt-splash" data-frame="7" src="images/characters/flightattpost2/7.png" alt="" loading="lazy">
    <img class="flightatt-splash" data-frame="8" src="images/characters/flightattpost2/8.png" alt="" loading="lazy">
    <img class="flightatt-splash" data-frame="9" src="images/characters/flightattpost2/9.png" alt="" loading="lazy">
    <img class="flightatt-splash" data-frame="10" src="images/characters/flightattpost2/10.png" alt="" loading="lazy">
    <img class="flightatt-splash" data-frame="11" src="images/characters/flightattpost2/11.png" alt="" loading="lazy">
    <img class="game-bg-sky" src="images/bg/sky.png" alt="">
    <img class="game-bg-cloud game-bg-cloud1" src="images/bg/cloud1.png" alt="">
    <img class="game-bg-cloud game-bg-cloud2" src="images/bg/cloud2.png" alt="">
    <img class="game-bg-city" src="images/bg/level3complete.png" alt="">
    <img class="game-bg-people" src="images/characters/people.png" alt="">
    <img class="game-bg-men game-bg-men2" src="images/characters/men2.png" alt="" loading="lazy">
    <img class="game-bg-men game-bg-men1" src="images/characters/men1.png" alt="" loading="lazy">
    <img class="game-bg-women game-bg-women1" src="images/characters/women1.png" alt="" loading="lazy">
    <img class="game-bg-girl game-bg-girl2" src="images/characters/girl2.png" alt="" loading="lazy">
    <img class="game-bg-girl game-bg-girl1" src="images/characters/girl1.png" alt="" loading="lazy">
    <img class="game-bg-plane game-bg-plane1" src="images/bg/plane.png" alt="">
    <img class="game-bg-plane game-bg-plane2" src="images/bg/plane2.png" alt="">
    <img class="game-bg-plane game-bg-plane3" src="images/bg/plane3.png" alt="">
    <img class="game-bg-plane game-bg-plane4" src="images/bg/plane4.png" alt="">
    <img class="game-bg-plane game-bg-plane5" src="images/bg/plane5.png" alt="">
    <img class="game-bg-plane game-bg-plane6" src="images/bg/plane6.png" alt="">
    <div id="splash-highscore-wrap" style="display:none">
      <span id="splash-highscore-label">Mejor puntaje</span>
      <span id="splash-highscore-value">—</span>
    </div>
    <img class="game-bg-stairs" src="images/bg/stairs.png" alt="">
    <div class="splash-howtoplay-wrap">
      <img class="splash-howtoplaytable" src="images/howtoplaytable.png" alt="">
      <div class="splash-howtoplay-title">City Blitz</div>
      <video class="splash-howtoplay-video" src="images/howtoplay/howtoplay3.mp4" loop muted playsinline preload="none"></video>
    </div>
<div class="splash-confirm-wrap">
      <img class="splash-confirm1" src="images/confirm1.png" alt="">
      <img class="splash-confirm2" src="images/confirm2.png" alt="" loading="lazy">
    </div><button id="btn-start" style="display:none">Jugar</button>
<div class="splash-text2-wrap">
      <img class="splash-text2" src="images/text2.png" alt="">
      <p class="splash-text2-label">¡Veamos a qué ciudad va cada uno! Aquí es donde tú entras a formar parte.</p>
    </div>
  </div>

  <div id="gameover-screen" class="game-bg-screen">
    <img class="game-bg-table" src="images/checkerrortable.png" alt="" loading="lazy">
    <img class="game-bg-check3" src="images/check3.png" alt="" loading="lazy">
    <span class="grade-count-total"><span class="grade-count-x">x</span><span id="gameover-count-total">0</span></span>
    <div id="gameover-checks-row" class="checks-row"></div>
    <img class="game-bg-wrong3" src="images/wrong3.png" alt="" loading="lazy">
    <span class="wrong-count-total"><span class="wrong-count-x">x</span><span id="gameover-wrong-total">0</span></span>
    <div id="gameover-wrongs-row" class="wrongs-row"></div>
    <img class="flightatt" src="images/characters/flightattpost/1.png" alt="" loading="lazy">
    <img class="flightatt" src="images/characters/flightattpost/2.png" alt="" loading="lazy">
    <img class="flightatt" src="images/characters/flightattpost/3.png" alt="" loading="lazy">
    <img class="flightatt" src="images/characters/flightattpost/4.png" alt="" loading="lazy">
    <img class="flightatt" src="images/characters/flightattpost/5.png" alt="" loading="lazy">
    <img class="flightatt" src="images/characters/flightattpost/6.png" alt="" loading="lazy">
    <img class="flightatt" src="images/characters/flightattpost/7.png" alt="" loading="lazy">
    <img class="flightatt" src="images/characters/flightattpost/8.png" alt="" loading="lazy">
    <img class="flightatt" src="images/characters/flightattpost/9.png" alt="" loading="lazy">
    <img class="flightatt" src="images/characters/flightattpost/10.png" alt="" loading="lazy">
    <img class="flightatt" src="images/characters/flightattpost/11.png" alt="" loading="lazy">
    <img class="flightatt" src="images/characters/flightattpost/12.png" alt="" loading="lazy">
    <img class="flightatt" src="images/characters/flightattpost/13.png" alt="" loading="lazy">
    <img class="flightatt" src="images/characters/flightattpost/14.png" alt="" loading="lazy">
    <img class="flightatt" src="images/characters/flightattpost/15.png" alt="" loading="lazy">
    <img class="game-bg-sky" src="images/bg/sky.png" alt="" loading="lazy">
    <img class="game-bg-cloud game-bg-cloud1" src="images/bg/cloud1.png" alt="" loading="lazy">
    <img class="game-bg-cloud game-bg-cloud2" src="images/bg/cloud2.png" alt="" loading="lazy">
    <img class="game-bg-city" src="images/bg/level3complete.png" alt="" loading="lazy">
    <img class="game-bg-people" src="images/characters/people.png" alt="" loading="lazy">
    <img class="game-bg-men game-bg-men2" src="images/characters/men2.png" alt="" loading="lazy">
    <img class="game-bg-men game-bg-men1" src="images/characters/men1.png" alt="" loading="lazy">
    <img class="game-bg-women game-bg-women1" src="images/characters/women1.png" alt="" loading="lazy">
    <img class="game-bg-girl game-bg-girl2" src="images/characters/girl2.png" alt="" loading="lazy">
    <img class="game-bg-girl game-bg-girl1" src="images/characters/girl1.png" alt="" loading="lazy">
    <img class="game-bg-plane game-bg-plane1" src="images/bg/plane.png" alt="" loading="lazy">
    <img class="game-bg-plane game-bg-plane2" src="images/bg/plane2.png" alt="" loading="lazy">
    <img class="game-bg-plane game-bg-plane3" src="images/bg/plane3.png" alt="" loading="lazy">
    <img class="game-bg-plane game-bg-plane4" src="images/bg/plane4.png" alt="" loading="lazy">
    <img class="game-bg-plane game-bg-plane5" src="images/bg/plane5.png" alt="" loading="lazy">
    <img class="game-bg-plane game-bg-plane6" src="images/bg/plane6.png" alt="" loading="lazy">
    <img class="game-bg-stairs" src="images/bg/stairs.png" alt="" loading="lazy">
    <h2>¡Tiempo!</h2>
    <div id="final-score-label">Puntaje final</div>
    <div id="final-score-value">0</div>
    <div id="new-highscore-banner" style="display:none">
      <span id="new-highscore-text">¡Nuevo récord!</span>
      <span id="new-highscore-score"></span>
    </div>
    <div class="gameover-text1-wrap">
      <img class="gameover-text1" src="images/text1.png" alt="">
      <p class="gameover-text1-label">¡Buen intento! ¡Todos llegaron a sus ciudades de destino!</p>
    </div>
    <div class="gameover-confirm-wrap">
      <img class="gameover-confirm1" src="images/confirm1.png" alt="">
      <img class="gameover-confirm2" src="images/confirm2.png" alt="" loading="lazy">
    </div>
  </div>

  <div id="game-wrapper">

    <canvas id="game-canvas" oncontextmenu="return false"></canvas>

    <div id="city-tag">
      <img src="images/tag3.png" alt="">
      <span id="city-tag-text">Ciudad</span>
    </div>

    <div id="countdown-widget">
      <img src="images/countdown.png" alt="">
      <div id="timer-number">60</div>
      <div id="progress-dots">
        <div class="dot"></div><div class="dot"></div><div class="dot"></div>
        <div class="dot"></div><div class="dot"></div><div class="dot"></div>
        <div class="dot"></div><div class="dot"></div><div class="dot"></div>
        <div class="dot"></div>
      </div>
    </div>

    <div id="result-label"></div>
    <div id="coord-tooltip"></div>

  </div>

  <div id="speed-bonus-text">¡Bonus velocidad!</div>

  <div id="score-display">
    <img src="images/points.png" alt="">
    <div id="score-value">0</div>
  </div>

  <div id="right-panel">
    <div id="leaderboard"></div>
    <div id="highscore-value" style="display:none">0</div>
  </div>

  <div id="pregame-countdown" style="display:none">
    <img id="pregame-countdown-img" src="" alt="">
  </div>

  <div id="timeup-overlay" style="display:none">
    <img src="images/countdown/timeup.png" alt="Time Up" loading="lazy">
  </div>

  <div id="vol-btn">
    <img id="vol-img" src="images/vol1.png" alt="">
  </div>

  <!-- ── MODO BANDERAS ──────────────────────────────────── -->
  <div id="flags-wrapper" style="display:none">

    <div id="flags-countdown-widget">
      <img src="images/countdown2.png" alt="">
      <div id="flags-timer-number">60</div>
      <div id="flags-progress-dots">
        <div class="dot"></div><div class="dot"></div><div class="dot"></div>
        <div class="dot"></div><div class="dot"></div><div class="dot"></div>
        <div class="dot"></div><div class="dot"></div><div class="dot"></div>
        <div class="dot"></div>
      </div>
    </div>

    <div id="flags-result-label"></div>

  </div>

  <div id="flags-speed-bonus-text">¡Bonus velocidad!</div>

  <div id="flags-score-display" style="display:none">
    <img src="images/points.png" alt="">
    <div id="flags-score-value">0</div>
  </div>

  <div id="flags-right-panel" style="display:none">
    <div id="flags-leaderboard"></div>
    <div id="flags-highscore-value" style="display:none">0</div>
  </div>

  <div id="flags-pregame-countdown" style="display:none">
    <img id="flags-pregame-countdown-img" src="" alt="">
  </div>

  <div id="flags-timeup-overlay" style="display:none">
    <img src="images/countdown/timeup.png" alt="Time Up" loading="lazy">
  </div>

  <img id="flags-machine" src="images/machine1.png" alt="" style="display:none">
  <img id="flags-findluggage" src="images/findluggage.png" alt="" style="display:none">
  <img id="flags-machine2" src="images/machine2.png" alt="" style="display:none">
  <img id="flags-machine3" src="images/machine3.png" alt="" style="display:none">
  <img id="flags-machine3b" src="images/machine3.png" alt="" style="display:none">
  <img id="flags-check-overlay" src="images/check.png" alt="">
  <img id="flags-wrong-overlay" src="images/wrong.png" alt="">
  <canvas id="flags-badge-canvas"></canvas>
  <div id="flags-luggage-wrap" style="display:none">
    <div id="flags-luggage-left-group">
      <div id="flags-flag-container-left">
        <img id="flags-flag-img-left" src="" alt="">
      </div>
      <img class="flags-luggage-side" src="images/luggage.png" alt="">
    </div>
    <div id="flags-luggage-group">
      <div id="flags-flag-container">
        <img id="flags-flag-img" src="" alt="">
      </div>
      <img id="flags-luggage" src="images/luggage.png" alt="">
    </div>
    <div id="flags-luggage-right-group">
      <div id="flags-flag-container-right">
        <img id="flags-flag-img-right" src="" alt="">
      </div>
      <img class="flags-luggage-side" src="images/luggage.png" alt="">
    </div>
    <div id="flags-luggage-bl-group" style="display:none">
      <div id="flags-flag-container-bl">
        <img id="flags-flag-img-bl" src="" alt="">
      </div>
      <img class="flags-luggage-side" src="images/luggage.png" alt="">
    </div>
    <div id="flags-luggage-bc-group" style="display:none">
      <div id="flags-flag-container-bc">
        <img id="flags-flag-img-bc" src="" alt="">
      </div>
      <img class="flags-luggage-side" src="images/luggage.png" alt="">
    </div>
    <div id="flags-luggage-br-group" style="display:none">
      <div id="flags-flag-container-br">
        <img id="flags-flag-img-br" src="" alt="">
      </div>
      <img class="flags-luggage-side" src="images/luggage.png" alt="">
    </div>
  </div>
  <div id="flags-flagid-wrap" style="display:none">
    <img id="flags-flagid" src="images/flagid.png" alt="">
    <div id="flags-flagid-label"></div>
  </div>
  <!-- ── FIN MODO BANDERAS ───────────────────────────────── -->

  <script src="js/cities.js"></script>
  <script src="js/countries.js"></script>
  <script src="js/game.js"></script>
  <script src="js/flags.js"></script>

</body>
</html>
